### web
server:
  port: 8080
  servlet:
    context-path: /xxl-job-admin

### actuator
management:
  endpoints:
    web:
      base-path: /actuator
  health:
    mail:
      enabled: false

### resources
spring:
  mvc:
    servlet:
      load-on-startup: 0
    static-path-pattern: /static/**
  web:
    resources:
      static-locations: classpath:/static/

  ### freemarker
  freemarker:
    template-loader-path: classpath:/templates/
    suffix: .ftl
    charset: UTF-8
    request-context-attribute: request
    settings:
      number_format: 0.##########
      new_builtin_class_resolver: safer

### mybatis
mybatis:
  mapper-locations: classpath:/mapper/*Mapper.xml

### datasource-pool
spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 10
      maximum-pool-size: 30
      auto-commit: true
      idle-timeout: 30000
      pool-name: HikariCP
      max-lifetime: 900000
      connection-timeout: 10000
      connection-test-query: SELECT 1
      validation-timeout: 1000

    ### xxl-job, datasource
    url: jdbc:mysql://127.0.0.1:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  ### xxl-job, email
  mail:
    host: smtp.qq.com
    port: 25
    username: xxx@qq.com
    from: xxx@qq.com
    password: xxx
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory

### xxl-job, access token
xxl:
  job:
    accessToken: default_token

    ### xxl-job, timeout by second, default 3s
    timeout: 3

    ### xxl-job, i18n (default is zh_CN, and you can choose "zh_CN", "zh_TC" and "en")
    i18n: zh_CN

    ## xxl-job, triggerpool max size
    triggerpool:
      fast:
        max: 300
      slow:
        max: 200

    ## xxl-job, schedule batch size
    schedule:
      batchsize: 100

    ### xxl-job, log retention days
    logretentiondays: 30

### xxl-sso
xxl-sso:
  token:
    key: xxl_job_login_token
    timeout: 604800000
  client:
    excluded:
      paths: ""
    login:
      path: /auth/login