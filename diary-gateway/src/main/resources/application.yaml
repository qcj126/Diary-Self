spring:
  application:
    name: diary-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:
            - id: diary-user
              uri: http://localhost:8801
              predicates:
                - Path=/user/**
            - id: diary-file
              uri: http://localhost:8802
              predicates:
                - Path=/file/**
            - id: diary-recipe
              uri: http://localhost:8803
              predicates:
                - Path=/recipe/**
            - id: diary-timemachine
              uri: http://localhost:8804
              predicates:
                - Path=/time-machine/**
            - id: diary-diet
              uri: http://localhost:8805
              predicates:
                - Path=/diet/**
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOriginPatterns: "http://localhost:1025"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
  main:
    web-application-type: reactive
server:
  port: 10000
# JWT configuration
jwt:
  secret: your256bitsecretkeymustbeatleast32characterslong
  expiration: 7200000 # 2 hours in milliseconds
management:
  endpoints:
    web:
      exposure:
        include: prometheus,health  # 暴露 prometheus 端点
  prometheus:
    metrics:
      export:
        enabled: true
    tags:
      application: ${spring.application.name}  # 添加应用名标签
      instance: 127.0.0.1:10000  # 添加实例标签